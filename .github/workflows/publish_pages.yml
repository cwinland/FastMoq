name: Publish Pages

# Required permissions for GitHub Pages OIDC deployment token
permissions:
  contents: read      # to fetch the repository
  pages: write        # to publish to Pages
  id-token: write     # to request the OIDC token (fixes ACTIONS_ID_TOKEN_REQUEST_URL error)

on:
  # Publish only after CI succeeds or when manually dispatched
  workflow_run:
    workflows: ["CI (master)"]
    types: [ completed ]
  release:
    types: [ published ]
  workflow_dispatch:

# Ensure only one Pages deployment runs at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  detect-api-doc-changes:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.filter.outputs.should_publish }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Detect API doc-impacting changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event_name }}" = "release" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files=$(git diff --name-only HEAD^ HEAD)
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -E '^(\.config/dotnet-tools\.json|\.github/workflows/publish_pages\.yml|\.github/workflows/validate_api_docs\.yml|docfx\.json|docfx-template/|index\.md|FAQs\.md|docs/README\.md|docs/api/|docs/breaking-changes/|docs/cookbook/|docs/feature-parity/|docs/getting-started/|docs/migration/|docs/roadmap/|docs/samples/|docs/whats-new/|FastMoq\.TestingExample/|scripts/Generate-ApiDocs\.ps1|scripts/Write-DocfxBuildMetadata\.ps1|FastMoq\.Abstractions/|FastMoq\.Core/|FastMoq\.Database/|FastMoq\.Provider\.Moq/|FastMoq\.Provider\.NSubstitute/|FastMoq\.Web/|FastMoq/)' >/dev/null; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: detect-api-doc-changes
    # Only run for successful CI completion or manual dispatch
    if: >-
      ${{ ((github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' || github.event_name == 'release') && needs.detect-api-doc-changes.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FASTMOQ_DOC_PUBLISHED_VERSION: ''
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.release.tag_name || github.event.workflow_run.head_sha || github.sha }}

      - name: Set published version metadata
        if: github.event_name == 'release'
        run: |
          echo "FASTMOQ_DOC_PUBLISHED_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build API site
        run: |
          pwsh ./scripts/Generate-ApiDocs.ps1 -PublishedVersion "$FASTMOQ_DOC_PUBLISHED_VERSION"

      - name: "Guard: Validate generated site content"
        run: |
          set -euo pipefail
          if [ ! -f Help/index.html ]; then
            echo "DocFX build did not produce Help/index.html" >&2
            ls -al Help || true
            exit 1
          fi
          echo "Generated Help/index.html. Proceeding."

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Help  # adjust if your site source is elsewhere

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment summary
        if: success()
        run: |
          {
            echo "### Pages Deployment";
            echo "Commit: $GITHUB_SHA";
            echo "Actor: $GITHUB_ACTOR";
            if [ -n "${{ steps.deployment.outputs.page_url }}" ]; then
              echo "URL: ${{ steps.deployment.outputs.page_url }}";
            fi;
          } >> $GITHUB_STEP_SUMMARY

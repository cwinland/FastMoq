  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Creates an HTTP client backed by FastMoq-managed HTTP dependencies.
  remarks: >-
    This entry point remains supported after v5.

    New tests should prefer the provider-neutral request helpers in this class for HTTP behavior.

    Advanced protected-member setups remain available from the Moq provider package for migration scenarios.
  example: []
  syntax:
    content: public static HttpClient CreateHttpClient(this Mocker mocker, string clientName = "FastMoqHttpClient", string baseAddress = "http://localhost", HttpStatusCode statusCode = HttpStatusCode.OK, string stringContent = "[{'id':1}]")
    parameters:
    - id: mocker
      type: FastMoq.Mocker
    - id: clientName
      type: System.String
    - id: baseAddress
      type: System.String
    - id: statusCode
      type: System.Net.HttpStatusCode
    - id: stringContent
      type: System.String
    return:
      type: System.Net.Http.HttpClient
    content.vb: Public Shared Function CreateHttpClient(mocker As Mocker, clientName As String = "FastMoqHttpClient", baseAddress As String = "http://localhost", statusCode As HttpStatusCode = HttpStatusCode.OK, stringContent As String = "[{'id':1}]") As HttpClient

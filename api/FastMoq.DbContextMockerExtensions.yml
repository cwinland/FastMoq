  namespace: FastMoq
  summary: Creates the legacy Moq-based DbContext mock used by the database helper package.
  example: []
  syntax:
    content: public static Mock? CreateLegacyDbContextMock(Type requestedType, MockBehavior behavior, object?[] constructorArgs)
    parameters:
    - id: requestedType
      type: System.Type
      description: The DbContext runtime type to mock.
    - id: behavior
      type: Moq.MockBehavior
      description: The Moq behavior that should be applied to the created mock.
    - id: constructorArgs
      type: System.Object[]
      description: The constructor arguments to pass through when a DbContext constructor requires them.
    return:
      type: Moq.Mock
      description: A legacy <xref href="Moq.Mock" data-throw-if-not-resolved="false"></xref> instance for the requested DbContext type.

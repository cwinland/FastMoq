  assemblies:
  - FastMoq.Database
  namespace: FastMoq
  summary: Attempts to create and track a managed DbContext instance for the requested type when the type represents an Entity Framework DbContext that is not already tracked.
  example: []
  syntax:
    content: public static bool TryCreateManagedDbContextInstance(Mocker mocker, Type requestedType, out object? instance)
    parameters:
    - id: mocker
      type: FastMoq.Mocker
      description: The mocker that should own the tracked DbContext instance.
    - id: requestedType
      type: System.Type
      description: The requested runtime type.
    - id: instance
      type: System.Object
      description: When this method returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, contains the tracked DbContext instance.
    return:
      type: System.Boolean
      description: <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> when a managed DbContext instance was created; otherwise, <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>.

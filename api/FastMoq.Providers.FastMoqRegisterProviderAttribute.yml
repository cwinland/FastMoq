  assemblies:
  - FastMoq.Abstractions
  namespace: FastMoq.Providers
  summary: Registers a FastMoq provider for the current assembly.
  remarks: >-
    <p>Use this when the provider must be registered before selection, for example for custom providers, aliases, or explicit first-party package bootstrap.</p>

    <p>Set <xref href="FastMoq.Providers.FastMoqRegisterProviderAttribute.SetAsDefault" data-throw-if-not-resolved="false"></xref> to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> to make the registered provider the assembly default.</p>
  example:
  - >-
    <pre><code class="lang-csharp">using FastMoq.Providers;

    using FastMoq.Providers.MoqProvider;


    [assembly: FastMoqRegisterProvider("moq", typeof(MoqMockingProvider), SetAsDefault = true)]</code></pre>
  syntax:
    content: >-
      [AttributeUsage(AttributeTargets.Assembly, AllowMultiple = true)]

      public sealed class FastMoqRegisterProviderAttribute : Attribute
    content.vb: >-
      <AttributeUsage(AttributeTargets.Assembly, AllowMultiple:=True)>


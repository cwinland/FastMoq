  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Helper methods for reflection-based assertions, constructor-guard verification, and logger verification helpers used in tests.
  example:
  - >-
    <p>The logger helpers are commonly used to keep tests focused on intent instead of verbose Moq verification expressions.</p>

    <pre><code class="lang-csharp">var logger = Mocks.GetMock&lt;ILogger&lt;CheckoutService&gt;&gt;();


    Component.Submit(order);


    logger.VerifyLogger(LogLevel.Information, "Order submitted", times: 1);</code></pre>

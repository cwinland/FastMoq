  namespace: FastMoq.Web.Blazor.Models
  summary: Represents a render parameter used by <xref href="FastMoq.Web.Blazor.MockerBlazorTestBase%601" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    This type replaces direct consumer use of bUnit's older <code>ComponentParameter</code> surface.

    Use <xref href="FastMoq.Web.Blazor.Models.RenderParameter.Create(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref> for ordinary parameters and <xref href="FastMoq.Web.Blazor.Models.RenderParameter.CreateCascading(System.String%2cSystem.Object)" data-throw-if-not-resolved="false"></xref>

    when the value must be supplied as a named cascading parameter.
  example:
  - >-
    <pre><code class="lang-csharp">RenderParameters.Add(RenderParameter.Create(nameof(OrdersPage.Title), "Queued Orders"));

    RenderParameters.Add(RenderParameter.CreateCascading("Accent", "Ocean"));</code></pre>

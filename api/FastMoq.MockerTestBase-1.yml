  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Tests the constructor parameters.
  example:
  - >-
    <p>Use TestConstructorParameters to verify null checks with default value generation.</p>

    <pre><code class="lang-csharp">[Fact]

    public void Service_NullArgChecks() =&gt; TestConstructorParameters((action, constructorName, parameterName) =&gt;

    {
        output?.WriteLine($"Testing {constructorName}\n - {parameterName}");

        action
            .Should()
            .Throw<ArgumentNullException>()
            .WithMessage($"*{parameterName}*");
    });</code></pre>

    <p>Provide explicit invalid and valid values when constructor parameter defaults need to vary by type.</p>

    <pre><code class="lang-csharp">[Fact]

    public void Service_NullArgChecks_WithOverrides() =&gt; TestConstructorParameters(
        (action, constructorName, parameterName) =&gt;
        {
            action
                .Should()
                .Throw&lt;ArgumentNullException&gt;()
                .WithMessage($"*{parameterName}*");
        },
        info =&gt; info.ParameterType.Name switch
        {
            "string" =&gt; string.Empty,
            "int" =&gt; -1,
            _ =&gt; default,
        },
        info =&gt; info.ParameterType.Name switch
        {
            "string" =&gt; "Valid Value",
            "int" =&gt; 22,
            _ =&gt; Mocks.GetObject(info.ParameterType),
        });</code></pre>

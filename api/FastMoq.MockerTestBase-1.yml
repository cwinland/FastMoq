  - >-
    <p>Use <xref href="FastMoq.MockerTestBase%601.CreateComponent" data-throw-if-not-resolved="false"></xref> when the test needs to change mock behavior first and then rebuild the component with the updated arrangement.</p>

    <pre><code class="lang-csharp">[Fact]

    public void Recreates_component_after_overriding_a_dependency()

    {
        Mocks.GetMock&lt;IPricingClient&gt;()

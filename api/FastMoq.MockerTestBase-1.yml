  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: >-
    Mock Test Base with Automatic Mocking using <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref>.

    This class contains the <xref href="FastMoq.MockerTestBase%601.Mocks" data-throw-if-not-resolved="false"></xref> property to create and track all Mocks from creation of the component.
  example:
  - >-
    <p>Use <xref href="FastMoq.MockerTestBase%601" data-throw-if-not-resolved="false"></xref> when you want the component under test created automatically with constructor dependencies resolved from FastMoq.</p>

    <pre><code class="lang-csharp">public class CheckoutServiceTests : MockerTestBase&lt;CheckoutService&gt;

    {
        protected override Action&lt;Mocker&gt; SetupMocksAction =&gt; mocker =&gt;
        {
            mocker.GetMock&lt;IPricingClient&gt;()
                .Setup(x =&gt; x.GetPrice("SKU-42"))
                .Returns(125.50m);

            mocker.AddType<IClock>(new FixedClock(new DateTimeOffset(2026, 4, 4, 12, 0, 0, TimeSpan.Zero)));
        };

        [Fact]
        public void Calculates_total_using_auto_injected_dependencies()
        {
            var total = Component.CalculateTotal("SKU-42", quantity: 2);

            total.Should().Be(251.00m);
            Mocks.GetMock<IPricingClient>().Verify(x => x.GetPrice("SKU-42"), Times.Once);
        }
    }</code></pre>

    <p>The base class creates <code>CheckoutService</code> before the test body runs, so the test can assert directly against <xref href="FastMoq.MockerTestBase%601.Component" data-throw-if-not-resolved="false"></xref>.</p>

    <pre><code class="lang-csharp">public sealed class CheckoutService

    {
        public CheckoutService(IPricingClient pricingClient, IClock clock)
        {
            _pricingClient = pricingClient;
            _clock = clock;
        }
    }</code></pre>

    <p>Use <xref href="FastMoq.MockerTestBase%601.CreatedComponentAction" data-throw-if-not-resolved="false"></xref> when you need a final arrangement step after construction, such as setting mutable state or attaching events.</p>

    <pre><code class="lang-csharp">protected override Action&lt;CheckoutService&gt; CreatedComponentAction =&gt; component =&gt;
        component.Currency = "USD";</code></pre>

  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Helpers for creating components or raw mocks when you need constructor selection to be explicit in a test.
  example:
  - >-
    <p>Use these overloads when the constructor choice matters and you want to supply only a subset of arguments explicitly.</p>

    <pre><code class="lang-csharp">var mocker = new Mocker();


    var processor = mocker.CreateInstance&lt;OrderProcessor, string&gt;(
        new Dictionary&lt;Type, object?&gt;
        {
            [typeof(string)] = "orders-eu"
        });

    processor.Should().NotBeNull();</code></pre>

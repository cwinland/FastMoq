  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Creates an instance of <code>T</code> by selecting the constructor that matches <code class="typeparamref">TParam1</code> and injecting the supplied value from <code class="paramref">data</code>.
  example:
  - >-
    <p>This is useful when a component has multiple constructors and your test needs to target the overload that accepts a tenant or region value.</p>

    <pre><code class="lang-csharp">var mocker = new Mocker();


    var handler = mocker.CreateInstance&lt;InvoiceHandler, string&gt;(
        new Dictionary&lt;Type, object?&gt;
        {
            [typeof(string)] = "contoso"
        });

    handler.Should().NotBeNull();

    handler!.TenantName.Should().Be("contoso");</code></pre>
  syntax:
    content: 'public static T? CreateInstance<T, TParam1>(this Mocker mocker, Dictionary<Type, object?> data) where T : class'
    parameters:
    - id: mocker
      type: FastMoq.Mocker
      description: The mocker.
    - id: data
      type: System.Collections.Generic.Dictionary{System.Type,System.Object}
      description: The data.
    typeParameters:
    - id: T
      description: The concrete type to create.
    - id: TParam1
      description: The type of the t param1.
    return:
      type: '{T}'
      description: The created instance or <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/keywords/null">null</a> when resolution cannot produce one.

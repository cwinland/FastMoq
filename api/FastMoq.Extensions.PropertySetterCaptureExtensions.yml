  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Replaces the current interface registration with a proxy that records assignments to the selected property into the supplied capture instance while forwarding unrelated members to the previously resolved instance.
  remarks: When you use this helper from a <code>MockerTestBase&lt;TComponent&gt;</code>-based test, add the capture during the setup phase or call <code>CreateComponent()</code> after the registration change so the component is rebuilt against the proxy-wrapped dependency.
  example: []
  syntax:
    content: 'public static PropertyValueCapture<TValue> AddPropertySetterCapture<TService, TValue>(this Mocker mocker, Expression<Func<TService, TValue>> propertyExpression, PropertyValueCapture<TValue> capture, bool replace = true) where TService : class'
    parameters:
    - id: mocker
      type: FastMoq.Mocker
      description: The current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
    - id: propertyExpression
      type: System.Linq.Expressions.Expression{System.Func{{TService},{TValue}}}
      description: The interface property whose setter should be captured.
    - id: capture
      type: FastMoq.PropertyValueCapture{{TValue}}
      description: The capture that should record assigned values.
    - id: replace
      type: System.Boolean
      description: True to replace an existing registration for <code class="typeparamref">TService</code>. Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> because the helper intentionally swaps in a capture proxy.
    typeParameters:
    - id: TService
      description: The interface type to wrap.
    - id: TValue
      description: The property value type.
    return:
      type: FastMoq.PropertyValueCapture{{TValue}}
      description: The supplied <code class="paramref">capture</code>.
    content.vb: Public Shared Function AddPropertySetterCapture(Of TService As Class, TValue)(mocker As Mocker, propertyExpression As Expression(Of Func(Of TService, TValue)), capture As PropertyValueCapture(Of TValue), replace As Boolean = True) As PropertyValueCapture(Of TValue)

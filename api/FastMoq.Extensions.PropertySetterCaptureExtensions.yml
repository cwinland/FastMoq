    id: AddPropertySetterCapture
    path: FastMoq.Core/Extensions/PropertySetterCaptureExtensions.cs
    startLine: 32
  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Replaces the current interface registration with a proxy that captures assignments to the selected property while forwarding unrelated members to the previously resolved instance.
  remarks: When you use this helper from a <code>MockerTestBase&lt;TComponent&gt;</code>-based test, add the capture during the setup phase or call <code>CreateComponent()</code> after the registration change so the component is rebuilt against the proxy-wrapped dependency.
  example:
  - >-
    <pre><code class="lang-csharp">var modeCapture = Mocks.AddPropertySetterCapture&lt;IOrderGateway, string?&gt;(x =&gt; x.Mode);

    CreateComponent();


    await Component.RunAsync();


    modeCapture.Value.Should().Be("fast");</code></pre>
  syntax:
    content: 'public static PropertyValueCapture<TValue> AddPropertySetterCapture<TService, TValue>(this Mocker mocker, Expression<Func<TService, TValue>> propertyExpression, bool replace = true) where TService : class'
    parameters:
    - id: mocker
      type: FastMoq.Mocker
      description: The current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
    - id: propertyExpression
      type: System.Linq.Expressions.Expression{System.Func{{TService},{TValue}}}
      description: The interface property whose setter should be captured.
    - id: replace
      type: System.Boolean
      description: True to replace an existing registration for <code class="typeparamref">TService</code>. Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> because the helper intentionally swaps in a capture proxy.
    typeParameters:
    - id: TService
      description: The interface type to wrap.
    - id: TValue
      description: The property value type.
    return:
      type: FastMoq.PropertyValueCapture{{TValue}}
      description: A <xref href="FastMoq.PropertyValueCapture%601" data-throw-if-not-resolved="false"></xref> that records the assigned values.
    content.vb: Public Shared Function AddPropertySetterCapture(Of TService As Class, TValue)(mocker As Mocker, propertyExpression As Expression(Of Func(Of TService, TValue)), replace As Boolean = True) As PropertyValueCapture(Of TValue)

  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Gets an existing tracked provider-backed mock or creates and tracks one when it does not yet exist.
  example:
  - >-
    <p>Use <xref href="FastMoq.Mocker.GetOrCreateMock%60%601(FastMoq.MockRequestOptions)" data-throw-if-not-resolved="false"></xref> when the test needs the tracked mock handle itself, not just automatic constructor resolution.</p>

    <pre><code class="lang-csharp">var mocker = new Mocker();

    var gateway = mocker.GetOrCreateMock&lt;IOrderGateway&gt;();


    var submitter = new OrderSubmitter(gateway.Instance);

    submitter.Submit(42);


    mocker.Verify&lt;IOrderGateway&gt;(x =&gt; x.Publish(42), TimesSpec.Once);

    mocker.VerifyNoOtherCalls&lt;IOrderGateway&gt;();</code></pre>

    <p>Typical reasons to call it explicitly are: passing <code>Instance</code> into custom component construction, reusing the same tracked mock across calls, resetting it, or using keyed <xref href="FastMoq.MockRequestOptions" data-throw-if-not-resolved="false"></xref>.</p>

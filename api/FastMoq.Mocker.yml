  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Core mock coordinator (provider-based creation integrated).
  remarks: >-
    <h3>Resolution Hierarchy (v4)</h3>

    FastMoq uses consistent resolution hierarchies across different APIs:


    <h4>GetObject&lt;T&gt;() - Dependency Injection (Property/Field/Constructor)</h4>

    <ol><li>Custom registration via AddType&lt;T&gt;() or AddKnownType&lt;T&gt;()</li><li>Built-in known instances (e.g., IFileSystem returns in-memory file system)</li><li>Tracked mocks via GetOrCreateFastMock (get-or-create paradigm)</li><li>Default value (null or type default)</li></ol>

    <p>GetObject respects all custom configurations and auto-creates mocks when needed.</p>


    <h4>GetMock&lt;T&gt;() / GetOrCreateMock&lt;T&gt;() - Test Setup (Mock-Only Path)</h4>

    <ol><li>Tracked mocks only (get-or-create tracked mock, no custom registrations applied)</li><li>Mocks are preconfigured via SetupFastMock (e.g., IFileSystem delegates to built-in)</li></ol>

    <p>GetMock/GetOrCreateMock always return tracked mocks for test setup, bypassing custom AddType registrations. 

    This is intentional: AddType is for runtime instances, while GetMock is for test mocks.

    For setup values, use AddMock() or component constructor parameters instead.</p>


    <h4>GetParameter() - Constructor Parameter Resolution</h4>

    <ol><li>Custom type mapping (AddType&lt;TInterface, TImpl&gt;())</li><li>Falls back to GetObject for all other resolution</li></ol>

    <p>Constructor parameters follow the same hierarchy as GetObject after type mapping.</p>
  example:
  - >-
    <p>Use <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> as the main test composition root when you want provider-first arrangement based on concrete registrations and policy-driven construction.</p>

    <pre><code class="lang-csharp">var fileSystem = new MockFileSystem();

    fileSystem.AddFile(@"c:\orders\42.json", new MockFileData("{ \"id\": 42, \"total\": 125.50 }"));


    var mocker = new Mocker()
        .AddType&lt;IFileSystem&gt;(fileSystem);

    var resolvedFileSystem = mocker.GetRequiredObject&lt;IFileSystem&gt;();


    resolvedFileSystem.File.Exists(@"c:\orders\42.json").Should().BeTrue();

    resolvedFileSystem.Should().BeSameAs(fileSystem);</code></pre>

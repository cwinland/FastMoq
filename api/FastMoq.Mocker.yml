  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Returns a tracked mock for the requested type, creating it if needed.
  example:
  - >-
    <p>Use the callback overload when you want mock creation and setup in one place.</p>

    <pre><code class="lang-csharp">var mocker = new Mocker();


    mocker.GetMock&lt;IPaymentGateway&gt;(gateway =&gt;
        gateway.Setup(x =&gt; x.Charge(125.50m)).Returns(true));

    var service = mocker.GetRequiredObject&lt;CheckoutService&gt;();

    var approved = service.SubmitPayment(125.50m);


    approved.Should().BeTrue();

    mocker.GetMock&lt;IPaymentGateway&gt;().Verify(x =&gt; x.Charge(125.50m), Times.Once);</code></pre>
  syntax:

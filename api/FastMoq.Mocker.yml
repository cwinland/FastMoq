  namespace: FastMoq
  summary: Registers a concrete instance so future object resolution returns that instance instead of auto-creating a mock.
  example:
  - >-
    <p>Use this overload when a dependency should be a known runtime object rather than a tracked mock.</p>

    <pre><code class="lang-csharp">var fileSystem = new MockFileSystem();


    var mocker = new Mocker()
        .AddType&lt;IFileSystem&gt;(fileSystem);

    var resolvedFileSystem = mocker.GetRequiredObject&lt;IFileSystem&gt;();

    resolvedFileSystem.Should().BeSameAs(fileSystem);</code></pre>

    startLine: 60
  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Replaces the current interface registration with a proxy that preserves assignments for all readable and writable non-indexer properties while forwarding unrelated members to the previously resolved instance.
  remarks: >-
    Use <xref href="FastMoq.PropertyStateMode.ProxyOnly" data-throw-if-not-resolved="false"></xref> when the test needs detached property state on the proxy registration without mutating the previously wrapped instance.


    When you use this helper from a <code>MockerTestBase&lt;TComponent&gt;</code>-based test, add the helper during the setup phase or call <code>CreateComponent()</code> after the registration change so the component is rebuilt against the proxy-wrapped dependency.
  example:
  - >-
    <pre><code class="lang-csharp">var channel = Mocks.AddPropertyState&lt;IOrderSubmissionChannel&gt;(PropertyStateMode.ProxyOnly);

    CreateComponent();


    await Component.SubmitAsync("order-42", expedited: true, CancellationToken.None);


    channel.Mode.Should().Be("fast");</code></pre>
  syntax:
    content: 'public static TService AddPropertyState<TService>(this Mocker mocker, PropertyStateMode mode, bool replace = true) where TService : class'
    parameters:
    - id: mocker
      type: FastMoq.Mocker
      description: The current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
    - id: mode
      type: FastMoq.PropertyStateMode
      description: Controls whether property assignments also write through to the wrapped inner instance or stay on the proxy only.
    - id: replace
      type: System.Boolean
      description: True to replace an existing registration for <code class="typeparamref">TService</code>. Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> because the helper intentionally swaps in a property-state proxy.
    typeParameters:
    - id: TService
      description: The interface type to wrap.
    return:
      type: '{TService}'
      description: The proxy-backed instance now registered for <code class="typeparamref">TService</code>.
    content.vb: Public Shared Function AddPropertyState(Of TService As Class)(mocker As Mocker, mode As PropertyStateMode, replace As Boolean = True) As TService

  assemblies:
  - FastMoq.Provider.NSubstitute
  namespace: FastMoq.Providers.NSubstituteProvider
  summary: >-
    Returns the tracked substitute instance after validating that the active provider produced an NSubstitute substitute.

    Use this when the test intentionally needs NSubstitute-specific APIs such as <code>Received()</code>.
  example:
  - >-
    <p>Select the NSubstitute provider first, then use <xref href="FastMoq.Providers.NSubstituteProvider.IFastMockNSubstituteExtensions.AsNSubstitute%60%601(FastMoq.Providers.IFastMock%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> as the provider-native escape hatch when the test truly needs NSubstitute semantics.</p>

    <pre><code class="lang-csharp">using var providerScope = MockingProviderRegistry.Push("nsubstitute");


    var mocker = new Mocker();

    var gateway = mocker.GetOrCreateMock&lt;IOrderGateway&gt;();


    gateway.AsNSubstitute().Publish(42);

    gateway.Received().Publish(42);</code></pre>

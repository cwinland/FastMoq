  namespace: FastMoq.Providers.NSubstituteProvider
  summary: >-
    NSubstitute-specific convenience extensions for <xref href="FastMoq.Providers.IFastMock%601" data-throw-if-not-resolved="false"></xref>.

    These stay in the provider package so the core abstractions remain provider agnostic.

    Prefer provider-first members such as <xref href="FastMoq.Providers.IFastMock.Instance" data-throw-if-not-resolved="false"></xref>, <xref href="FastMoq.Providers.IFastMock.Reset" data-throw-if-not-resolved="false"></xref>, and FastMoq verification helpers first, and use these extensions when the test intentionally needs NSubstitute-specific APIs.

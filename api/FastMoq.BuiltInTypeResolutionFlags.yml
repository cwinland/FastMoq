    startLine: 83
  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Enables the conservative compatibility preset used for stricter legacy behavior.
  remarks: >-
    This preset currently includes only <xref href="FastMoq.BuiltInTypeResolutionFlags.DbContext" data-throw-if-not-resolved="false"></xref> resolution so that other built-in helpers stay

    disabled unless explicitly requested.
  example: []
  syntax:
    content: StrictCompatibilityDefaults = 8
    return:
      type: FastMoq.BuiltInTypeResolutionFlags

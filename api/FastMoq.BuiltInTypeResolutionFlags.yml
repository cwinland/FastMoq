  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Enables the lenient preset used for maximum built-in convenience.
  remarks: >-
    This preset is equivalent to <xref href="FastMoq.BuiltInTypeResolutionFlags.All" data-throw-if-not-resolved="false"></xref> and turns on every built-in category supported by the

    current version of FastMoq.
  example: []
  syntax:
    content: LenientDefaults = FileSystem | HttpClient | Uri | DbContext
    return:
      type: FastMoq.BuiltInTypeResolutionFlags
    content.vb: LenientDefaults = FileSystem Or HttpClient Or Uri Or DbContext

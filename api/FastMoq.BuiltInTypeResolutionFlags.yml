  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Specifies which built-in framework and utility types <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> may resolve automatically.
  remarks: >-
    <p>

    These flags control FastMoq's built-in object creation behavior for well-known types that are commonly

    needed during unit and integration-style test setup.

    </p>

    <p>

    The values can be combined to enable multiple categories at once, or compared against the provided preset

    values such as <xref href="FastMoq.BuiltInTypeResolutionFlags.StrictCompatibilityDefaults" data-throw-if-not-resolved="false"></xref> and <xref href="FastMoq.BuiltInTypeResolutionFlags.LenientDefaults" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    Use <xref href="FastMoq.BuiltInTypeResolutionFlags.None" data-throw-if-not-resolved="false"></xref> to disable all built-in resolutions and require explicit registrations, or use

    <xref href="FastMoq.BuiltInTypeResolutionFlags.All" data-throw-if-not-resolved="false"></xref> to enable every built-in category currently supported.

    </p>
  example: []
  syntax:
    content: >-
      [Flags]

      public enum BuiltInTypeResolutionFlags
    content.vb: >-
      <Flags>

      Public Enum BuiltInTypeResolutionFlags

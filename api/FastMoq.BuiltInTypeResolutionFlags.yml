  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Enables every built-in type resolution category currently supported.
  remarks: >-
    This is the broadest preset and is equivalent to combining <xref href="FastMoq.BuiltInTypeResolutionFlags.FileSystem" data-throw-if-not-resolved="false"></xref>,

    <xref href="FastMoq.BuiltInTypeResolutionFlags.HttpClient" data-throw-if-not-resolved="false"></xref>, <xref href="FastMoq.BuiltInTypeResolutionFlags.Uri" data-throw-if-not-resolved="false"></xref>, and <xref href="FastMoq.BuiltInTypeResolutionFlags.DbContext" data-throw-if-not-resolved="false"></xref>.

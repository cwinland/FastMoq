    remote:
      path: FastMoq.Core/MockerPolicyOptions.cs
      branch: AnalyzersAndHelpers
      repo: https://github.com/cwinland/FastMoq.git
    id: DefaultStrictMockCreation
    path: FastMoq.Core/MockerPolicyOptions.cs
    startLine: 20
  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: >-
    Controls the default strict-vs-loose behavior for provider-backed mock creation paths.

    When not set, FastMoq falls back to <xref href="FastMoq.MockFeatures.FailOnUnconfigured" data-throw-if-not-resolved="false"></xref>.

    This applies to provider-backed and legacy mock creation helpers, but not to the optional database helper package's

    DbContext-specific mock creation path, which stays on the supported DbContext helper behavior.

  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: When ambiguity remains, prefer the parameterless constructor from the current visibility scope if one exists; otherwise throw.
  example: []
  syntax:
    content: PreferParameterlessConstructor = 1
    return:
      type: FastMoq.ConstructorAmbiguityBehavior

      description: The current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
    - id: sink
      type: System.Action{Microsoft.Extensions.Logging.LogLevel,Microsoft.Extensions.Logging.EventId,System.String,System.Exception}

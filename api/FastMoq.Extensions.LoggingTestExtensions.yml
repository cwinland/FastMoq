  namespace: FastMoq.Extensions
  summary: Creates a logger factory that forwards captured log entries into the current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
  example:
  - >-
    <pre><code class="lang-csharp">var loggerFactory = Mocks.CreateLoggerFactory();

    var provider = Mocks.CreateTypedServiceProvider(services =&gt;

    {
        services.AddSingleton(loggerFactory);
        services.AddSingleton(typeof(ILogger&lt;&gt;), typeof(Logger&lt;&gt;));
    });</code></pre>
  syntax:

  namespace: FastMoq.Extensions
  summary: Creates a logger factory that mirrors captured log entries to the supplied sink while still forwarding them into the current <xref href="FastMoq.Mocker" data-throw-if-not-resolved="false"></xref> instance.
  example:
  - >-
    <pre><code class="lang-csharp">var loggerFactory = Mocks.CreateLoggerFactory((logLevel, eventId, message, exception) =&gt;

    {
        output.WriteLine($"[{logLevel}] {message}");
    });</code></pre>

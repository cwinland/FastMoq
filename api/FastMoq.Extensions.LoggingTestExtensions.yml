  assemblies:
  - FastMoq.Core
  namespace: FastMoq.Extensions
  summary: Creates and registers a logger factory along with direct <xref href="Microsoft.Extensions.Logging.ILogger" data-throw-if-not-resolved="false"></xref> and <xref href="Microsoft.Extensions.Logging.ILogger%601" data-throw-if-not-resolved="false"></xref> resolution support.
  example:
  - >-
    <pre><code class="lang-csharp">var mocker = new Mocker()
        .AddLoggerFactory();

    var logger = mocker.GetObject&lt;ILogger&lt;CheckoutService&gt;&gt;();

    logger.LogInformation("submitted order");


    mocker.VerifyLogged(LogLevel.Information, "submitted order");</code></pre>

  summary: >-
    Class DbSetMock.

    Implements the <xref href="Moq.Mock%601" data-throw-if-not-resolved="false"></xref>
  remarks: >-
    Any interface type can be used for mocking, but for classes, only abstract and virtual members can be mocked.


    <p>
      The behavior of the mock with regards to the setups and the actual calls is determined by the optional
      <xref href="Moq.MockBehavior" data-throw-if-not-resolved="false"></xref> that can be passed to the <xref href="Moq.Mock%601.%23ctor(Moq.MockBehavior)" data-throw-if-not-resolved="false"></xref> constructor.
    </p>
  example:
  - >-
    The following example shows establishing setups with specific values for method invocations:


    <pre><code class="lang-csharp">// Arrange

    var order = new Order(TALISKER, 50);

    var warehouse = new Mock&lt;IWarehouse&gt;();

    warehouse.Setup(w =&gt; w.HasInventory(TALISKER, 50)).Returns(true);


    // Act

    order.Fill(warehouse.Object);


    // Assert

    Assert.True(order.IsFilled);</code></pre>
  - >-
    The following example shows how to use the <xref href="Moq.It" data-throw-if-not-resolved="false"></xref> class

    to specify conditions for arguments instead of specific values:


    <pre><code class="lang-csharp">// Arrange

    var order = new Order(TALISKER, 50);

    var warehouse = new Mock&lt;IWarehouse&gt;();


    // shows how to expect a value within a range:

    warehouse.Setup(x =&gt; x.HasInventory(
                             It.IsAny&lt;string&gt;(),
                             It.IsInRange(0, 100, Range.Inclusive)))
             .Returns(false);

    // shows how to throw for unexpected calls.

    warehouse.Setup(x =&gt; x.Remove(
                             It.IsAny&lt;string&gt;(),
                             It.IsAny&lt;int&gt;()))
             .Throws(new InvalidOperationException());

    // Act

    order.Fill(warehouse.Object);


    // Assert

    Assert.False(order.IsFilled);</code></pre>

  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: Provides a fluent arrange/act/assert pipeline for a tracked scenario target.
  example:
  - >-
    <p>In MockerTestBase&lt;TComponent&gt;, prefer the parameterless overloads when Component is already available.</p>

    <p>This example uses the scenario pipeline together with provider-first verification.</p>

    <pre><code class="lang-csharp">Scenario
        .When(() =&gt; Component.Submit(42))
        .Then(() =&gt; Component.Channel.Should().Be("priority"))
        .Verify&lt;IOrderGateway&gt;(x =&gt; x.Publish(42), TimesSpec.Once)
        .VerifyNoOtherCalls&lt;IOrderGateway&gt;()
        .Execute();</code></pre>
    <p>Outside MockerTestBase&lt;TComponent&gt;, use the target-instance overloads.</p>

    <pre><code class="lang-csharp">await mocker.Scenario(service)
        .When(component =&gt; component.RunAsync())
        .Verify&lt;IBackgroundQueue&gt;(x =&gt; x.Enqueue("job-42"), TimesSpec.Once)
        .ExecuteAsync();</code></pre>

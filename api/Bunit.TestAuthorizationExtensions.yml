  assemblies:
  - FastMoq.Web
  namespace: Bunit
  summary: Adds bUnit authorization services and returns a compatibility wrapper around the authorization context.
  example:
  - >-
    <pre><code class="lang-csharp">var authContext = this.AddTestAuthorization();

    authContext.SetAuthorized("migration.user");</code></pre>
  syntax:
    content: public static TestAuthorizationContext AddTestAuthorization(this BunitContext context)

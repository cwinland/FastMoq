  summary: Captures property values assigned by a fake or stub during a test.
  example:
  - >-
    <pre><code class="lang-csharp">var modeCapture = new PropertyValueCapture&lt;string?&gt;();


    var sink = new FakeModeSink(modeCapture);

    Mocks.AddType&lt;IModeSink&gt;(sink);


    modeCapture.Value.Should().Be("updated");</code></pre>

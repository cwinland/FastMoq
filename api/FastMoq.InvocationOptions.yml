    id: FallbackToNonPublicMethods
    path: FastMoq.Core/InvocationOptions.cs
    startLine: 17
  assemblies:
  - FastMoq.Core
  namespace: FastMoq
  summary: >-
    Controls whether FastMoq may fall back from a public-method search to a non-public-method search.

    When not set, FastMoq uses the current <xref href="FastMoq.MockerPolicyOptions.DefaultFallbackToNonPublicMethods" data-throw-if-not-resolved="false"></xref> policy.

    Compatibility helpers such as <code>Strict</code> and preset methods can update that default policy.
  example: []
  syntax:
    content: public bool? FallbackToNonPublicMethods { get; set; }
    parameters: []
    return:
      type: System.Nullable{System.Boolean}
    content.vb: Public Property FallbackToNonPublicMethods As Boolean?
  overload: FastMoq.InvocationOptions.FallbackToNonPublicMethods*
